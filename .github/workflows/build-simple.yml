name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: './clipboard-manager/src-tauri -> target'

    - name: Install frontend dependencies
      run: npm install
      working-directory: clipboard-manager

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      with:
        projectPath: clipboard-manager

    - name: Upload Windows artifacts
      if: matrix.platform == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: |
          clipboard-manager/src-tauri/target/release/clipboard-manager.exe
          clipboard-manager/src-tauri/target/release/bundle/msi/*.msi
          clipboard-manager/src-tauri/target/release/bundle/nsis/*.exe
        retention-days: 30
