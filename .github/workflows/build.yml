name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: './clipboard-manager/src-tauri -> target'

    - name: Install dependencies
      run: npm install
      working-directory: clipboard-manager

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        projectPath: clipboard-manager
        tagName: v__VERSION__
        releaseName: 'Clipboard Manager v__VERSION__'
        releaseBody: 'See the assets to download and install this version.'
        releaseDraft: true
        prerelease: false

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: clipboard-manager-windows
        path: |
          clipboard-manager/src-tauri/target/release/bundle/msi/*.msi
          clipboard-manager/src-tauri/target/release/bundle/nsis/*.exe
        retention-days: 7
